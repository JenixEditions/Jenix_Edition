<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>JENIX_EDITIONS | Final Stable</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --ana: #00f2ff; --bg: #030303; --panel: #0a0a0a; --side: 250px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; }
        .sidebar { width: var(--side); height: 100vh; background: var(--panel); border-right: 2px solid var(--ana); position: fixed; padding: 40px 20px; display: flex; flex-direction: column; z-index: 100; }
        .nav-link { padding: 12px; margin-bottom: 5px; cursor: pointer; color: #555; font-weight: 700; transition: 0.3s; }
        .nav-link:hover, .nav-link.aktif { color: var(--ana); background: rgba(0,242,255,0.05); border-left: 3px solid var(--ana); }
        main { margin-left: var(--side); padding: 40px; width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .kart { background: #0f0f0f; border-radius: 15px; overflow: hidden; border: 1px solid #111; transition: 0.3s; cursor: pointer; }
        .kart:hover { border-color: var(--ana); transform: translateY(-5px); }
        .kart img { width: 100%; height: 150px; object-fit: cover; }
        .admin-btn { margin-top: auto; padding: 12px; background: none; border: 1px solid var(--ana); color: var(--ana); border-radius: 8px; cursor: pointer; font-weight: 900; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .m-box { background: #000; padding: 30px; border-radius: 20px; border: 1px solid var(--ana); width: 350px; text-align: center; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="font-family:'Orbitron'; color:var(--ana); margin-bottom:30px;">JENIX_HUB</h2>
    <div class="nav-link aktif" onclick="filtre('Hepsi')">📂 TÜM ARŞİV</div>
    <div class="nav-link" onclick="filtre('ETS 2')">🚛 ETS 2</div>
    <div class="nav-link" onclick="filtre('Assetto')">🏎️ ASSETTO</div>
    <button class="admin-btn" onclick="adminAc()">🛠️ ADMİN GİRİŞİ</button>
</div>

<main>
    <div class="grid" id="grid"></div>
</main>

<div id="adminModal" class="modal">
    <div class="m-box">
        <h2 style="margin-bottom:20px;">MOD EKLE</h2>
        <input type="text" id="nAd" placeholder="Mod Adı">
        <select id="nKat"><option>ETS 2</option><option>Assetto</option></select>
        <input type="text" id="nRes" placeholder="Resim Linki">
        <input type="text" id="nLink" placeholder="İndirme Linki">
        <button onclick="ekle()" style="width:100%; padding:12px; background:var(--ana); border:none; font-weight:900; cursor:pointer; border-radius:5px;">YÜKLE</button>
        <p onclick="this.parentElement.parentElement.style.display='none'" style="margin-top:10px; cursor:pointer; color:#666;">Kapat</p>
    </div>
</div>

<script>
    let modlar = JSON.parse(localStorage.getItem('jenix_db')) || [];

    function render(liste = modlar) {
        const g = document.getElementById('grid');
        g.innerHTML = liste.length ? "" : "<p style='color:#444;'>Henüz mod yok.</p>";
        liste.forEach((m, i) => {
            g.innerHTML += `<div class="kart" onclick="window.open('${m.link}')">
                <img src="${m.res}">
                <div style="padding:15px;"><small style="color:var(--ana)">${m.kat}</small><h3>${m.ad}</h3></div>
            </div>`;
        });
    }

    function filtre(k) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('aktif'));
        event.target.classList.add('aktif');
        render(k === 'Hepsi' ? modlar : modlar.filter(m => m.kat === k));
    }

    function adminAc() { if(prompt("Şifre:") === "1453") document.getElementById('adminModal').style.display='flex'; }

    function ekle() {
        const n = { ad: document.getElementById('nAd').value, kat: document.getElementById('nKat').value, res: document.getElementById('nRes').value, link: document.getElementById('nLink').value };
        if(!n.ad) return;
        modlar.push(n);
        localStorage.setItem('jenix_db', JSON.stringify(modlar));
        render();
        document.getElementById('adminModal').style.display='none';
    }

    render();
</script>
</body>
</html>
